<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <title>2026 Unified Examination for 3D Humans Entering the 4D World</title>
  <style>
    body {
      margin: 0;

      background: #dcdcdc;

      font-family: serif;

      height: 100vh;

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    div label {
      display: block;
    }

    #cardWrapper {
      overflow: hidden;

      max-height: 500px;

      transition:
        max-height 0.3s ease;
    }

    #cardWrapper.collapsed {
      max-height: 0;
    }

    .overlay {

      position: fixed;

      left: 0;
      top: 0;

      width: 100vw;
      height: 100vh;

      background:
        rgba(0, 0, 0, .45);

      display: none;

      justify-content: center;
      align-items: center;

      z-index: 999999;
    }

    .dialog {

      background: white;

      width: 420px;

      max-width: 90vw;

      border: 2px solid #222;

      padding: 25px;

      box-shadow:
        0 0 30px rgba(0, 0, 0, .4);

      text-align: center;
      display: none;
    }

    .dialog h2 {

      margin-top: 0;

      font-family:
        "SimSun", "宋体";

      border-bottom:
        1px solid #ccc;

      padding-bottom: 10px;
    }

    .dialog-buttons {

      margin-top: 20px;

      display: flex;

      justify-content: center;

      gap: 20px;
    }

    .dialog button {

      min-width: 100px;

      padding: 8px 20px;

      cursor: pointer;
    }

    .paper {
      position: relative;

      width: 420mm;
      min-height: 297mm;

      background: white;

      margin: 20px;

      box-sizing: border-box;

      padding:
        15mm 15mm 15mm 25mm;

      box-shadow:
        0 0 12px rgba(0, 0, 0, .3);
    }

    .paper::before {

      content:
        "wxyhly-en.github.io - Hqak";

      position: absolute;

      left: 50%;
      top: 50%;

      transform:
        translate(-50%, -50%) rotate(-30deg);

      font-size: 100px;

      font-weight: bold;

      color: rgba(128, 128, 128, 0.1);

      white-space: nowrap;

      pointer-events: none;

      z-index: 0;
    }

    .seal-line {
      position: absolute;

      left: 0;
      top: 0;

      width: 18mm;
      height: 100%;

      border-right: 2px dotted black;

      display: flex;

      justify-content: center;
      align-items: center;

      /* overflow:hidden; */
    }

    .subject-header {

      font-size: 22px;

      font-weight: bold;

      margin-top: 12px;
      margin-bottom: 10px;
      padding-bottom: 4px;
    }

    .seal-text {
      white-space: nowrap;

      transform: rotate(-90deg);

      transform-origin: center center;

      font-size: 18px;

      letter-spacing: 2px;
    }

    .page-content {
      height: 100%;
    }

    .columns {
      display: flex;
      gap: 10mm;
    }

    .column {
      flex: 1;
    }

    .page-number {
      text-align: center;

      margin-top: 10mm;
      margin-bottom: 5mm;
      bottom: 20px;
      position: absolute;
      width: 92%;
      font-size: 14px;
    }

    .topbar {
      background: #fff;
      padding: 8px;
      border-bottom: 1px solid #999;
      /* z-index: 999; */
    }

    .questions {
      flex: 1;

      overflow-y: auto;

      overflow-x: auto;
    }

    .topbar {
      flex-shrink: 0;
    }

    .answer-card {
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .card {
      width: 34px;
      height: 28px;
      border: 1px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #eee
    }

    .done {
      background: #9ec5ff
    }

    .answer-right {
      background: #b7efb7
    }

    .answer-wrong {
      background: #ffb7b7
    }

    .secret {
      text-align: left;
      font-weight: bold
    }

    .title {
      text-align: center;
      font-size: 28px;
      margin: 20px
    }

    .info {
      text-align: center
    }

    .question {
      scroll-margin-top: 10vh;
      scroll-margin-left: 50px;
      scroll-margin-right: 50px;
      break-inside: avoid;
      /* border-bottom: 1px dotted #bbb; */
      padding: 6px 0;
      margin-bottom: 6px
    }

    .meta {
      font-size: 12px;
      color: #666;
    }

    .analysis {
      display: none;
      margin-top: 8px;
      padding: 6px;
      background: #fafafa
    }

    .submit-area {
      text-align: center;
      margin: 8px
    }

    button {
      background-color: white;
      border-radius: 3px;
      border: 1px solid black;
      color: red;
    }

    .score {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      width: 80%;
      color: #900;
      position: absolute;
      z-index: 10;
    }

    @media print {
      body {
        background: #fff
      }

      .paper {
        box-shadow: none;
        margin: 0
      }

      .topbar,
      .submit-area {
        display: none
      }
    }

    .underline {
      border-bottom: black solid 1px;
      width: 40px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div style="cursor: pointer;text-align: center;"><b
        onclick="document.getElementById('cardWrapper').classList.toggle('collapsed')"> --- Answer Sheet --- </b> Zoom:
      <input type="range" min="0.5" max="1.5" step="0.05" value="1" id="zoom">
      <button onclick="showShareDialog()">Share</button>
      <button onclick="showSubmitDialog()">Submit</button>
    </div>
    <div id="cardWrapper" class="collapsed">
      <div id="card" class="answer-card"></div>
    </div>
  </div>

  <div id="questions" class="questions">
    <div id="paperContainer"></div>
  </div>

  <!-- </div> -->
  <div id="overlay" class="overlay">

    <div id="confirmDialog" class="dialog">

      <h2>Submit Exam</h2>

      <div id="confirmText"></div>

      <div class="dialog-buttons">

        <button id="cancelSubmit" onclick="closeOverlay();">
          Continue Reviewing
        </button>

        <button id="doSubmit" onclick="submitPaper()">
          Submit
        </button>

      </div>

    </div>

    <div id="resultDialog" class="dialog">

      <h2 id="res-title">Examination Ended</h2>

      <div id="resultText"></div>

      <div class="dialog-buttons">

        <button id="closeResult" onclick="closeOverlay()"> View Solutions </button>

      </div>

    </div>


    <div id="shareDialog" class="dialog">

      <h2 id="copy-title"></h2>

      <p style="margin:15px 0;">
        After opening this link, answer status will be loaded automatically.
      </p>

      <textarea id="shareUrl" readonly
        style="width:100%;height:100px;box-sizing:border-box;resize:none;font-family:monospace;"></textarea>

      <div class="dialog-buttons">

        <button onclick="copyShareURL()">
          Copy URL
        </button>

        <button onclick="hideShareDialog()">
          Close
        </button>

      </div>

    </div>

  </div>
  <script>
    const paperContainer = document.getElementById("paperContainer");
    zoom.oninput = () => {
      paperContainer.style.transform = `scale(${zoom.value})`;
      paperContainer.style.transformOrigin = "top left";
      paperContainer.style.width = (100 * zoom.value) + "%";
    };
    const QUESTION_BANK = `难度	科目	题目 	选项A	选项B	选项C	选项D	选项E	选项F	答案	解析
1	Basic Geometry	For a point p lying inside a plane, there are () planes that are absolutely perpendicular to that plane and pass through p.	0	1	2	infinite	undetermined		B	The normal plane direction of a plane is unique; once a fixed point is chosen, it is uniquely determined
1	Basic Geometry	For a point p lying outside a plane, there are () planes that are absolutely perpendicular to that plane and pass through p.	0	1	2	infinite	undetermined		B	The normal plane direction of a plane is unique; once a fixed point is chosen, it is uniquely determined
2	Basic Geometry	A uniformly rotating 4D sphere has a point whose trajectory under rotation cannot be ().	line segment	small circle	trefoil knot	torus knot			A	For a simple rotation, a non-equatorial point traces a small circle; for double rotation, the stereographic projection of a hyperspherical orbit is a torus knot; the trefoil knot is also a torus knot, corresponding to the special 2:3 rotation ratio
2	Basic Geometry	Given that all circles/spheres/hyperspheres have diameter 1, and all prisms and pyramids have height 1, which of the following is correct?	coninder has smaller volume than cylindrone	duocylinder has smaller volume than hypersphere	duocone has smaller volume than cubinder	cubinder and duocylinder have the same volume	dicone has 1/9 the volume of cubinder		C	The coninder is 1/3 the volume of a matching cylindrone with same base and height, while cylindrone is 1/4; A is false. A hypersphere of the same diameter can be fully contained in a duocylinder, so B is false. A duocone can be fully contained in a duocylinder, and a duocylinder can be contained in a cubinder, so C is correct. The volume ratio between cubinder and duocylinder is π/4, so D is false. The cone pyramid is 1/12 of cubinder volume, so E is false.
2	Basic Geometry	A 2D circle in 3D space becomes a torus by adding thickness; if this 3D torus surface is further thickened in 4D space, it becomes ().	spheritorus	torisphere	tiger	ditorus	flat torus		D	The spheritorus, torisphere, ditorus, and tiger can be viewed respectively as thickened circle, sphere, torus surface, and Cartesian product of two circles (flat torus surface) in 4D space
2	Basic Geometry	Given two planes, if a line in one plane is perpendicular to the other plane, but not parallel to it, then the two planes ().	dihedral angle is 90°	are absolutely perpendicular	are semi-perpendicular	they can be made cocellular via translation	they may intersect at a point but can be separated via translation		C	See definition of semi-perpendicular; infinite planes intersecting at a point cannot be separated by translation
2	Basic Geometry	If two planes have no intersection, then it is impossible that they are ().	dihedral angle is not 0°	absolutely parallel	semi-parallel	they can be made cocellular via translation	they can be made to intersect at a point via translation		E	Two planes can be semi-parallel
1	Basic Geometry	Which of the following statements about the relationship between a line and a plane is correct?	they must lie in a common 3D space	there is exactly one plane through a given line parallel to another given line	there are infinitely many planes passing through a given point perpendicular to a given line	if they are not parallel, they must intersect			C	A line-plane system can have an “exotic” relation similar to skew lines; thus A and D are wrong. A line has infinitely many normal planes; it only has a fixed 3D normal space, so C is correct. B is obviously wrong.
1	Basic Geometry	The correct statement about the 120-cell is:	it has 720 vertices	each edge is shared by 3 cells	each vertex has 5 incident edges	its faces are triangles	all are wrong		B	it has 600 vertices; each vertex has 4 edges; faces are pentagons
1	Basic Geometry	The dual of the 24-cell is the ()-cell.	5	8	16	24	120	600	D	The 24-cell is self-dual
2	Basic Geometry	Which analogy is incorrect?	line-segment → triangle → tetrahedron → 5-cell	line-segment → square → rhombic dodecahedron → 24-cell	line-segment → square → truncated cube → 24-cell	line-segment → square → octahedron → 16-cell	line-segment → hexagon → octahedron → bitruncated 5-cell	all correct	F	A are simplices; B and C involve dual polyhedra relations, consistent with 24-cell self-duality; D are orthoplexes; E refers to cross-section of 5D hypercube along diagonal
2	Basic Geometry	The 120-cell can be viewed as a discrete Hopf fibration: its 120 dodecahedral cells can be decomposed into () disjoint rings, each containing () cells.	6 20	10 12	12 10	20 6			C	The decagonal ring structure implies that the dihedral angle of the 120-cell is the integer 144°
2	Basic Geometry	For densest hypersphere packing in 4D space, which statement is incorrect?	each hypersphere has 24 neighbors	one can find octahedral structures in the packing	one can find truncated cube structures in the packing	if layered stacking is used, the first layer should use hexagonal close packing			D	Only face-centered cubic packing is valid; hexagonal stacking misaligns layers and prevents efficient fourth-dimensional offset; see 4D Space (III): On Regular Polytopes
2	Basic Geometry	Removing alternating vertices of a cube yields a tetrahedron. Which statement is correct?	applying the same operation to a tesseract yields a 5-cell	applying it to a 5D cube yields a 5D regular polytope	for highly symmetric uniform polytopes, removing different group of alternating vertices may produce different shapes	all are wrong			C	the resulting shape may be a mirror image of the other and cannot be matched by rotation alone
2	Basic Geometry	Given any four non-coplanar vertices of a tesseract, they define a 3D subspace. This subspace cuts the tesseract, producing a cross-section. Which shape cannot appear as such a cross-section?	tetrahedron	triangular prism	cuboid	octahedron	heptahedron	all possible	F	see 4D Space (II): Hyper-solid Geometry, tesseract cross-sections section
3	Basic Geometry	If plane A is isoclinic to plane B, and plane B is isoclinic to plane C, then ().	A is necessarily isoclinic to C	A cannot be isoclinic to C	A may be semi-parallel to C	If another plane D is isoclinic to both A and C, A and C may not be isoclinic to each other			C	Isoclinic relations have left- and right-handed types; only same-handed isoclinic relations are transitive. Opposite handedness may lead to semi-parallel configurations
3	Basic Geometry	Given that plane A is isoclinic to plane B, then ().	If planes C and D are also isoclinic with the same angle, the configuration formed by A and B may not be rotatable into that formed by C and D	The normal plane of A is not necessarily isoclinic to the normal plane of B	Not every line in plane B necessarily makes the same angle with plane A	Planes A and B do not necessarily intersect at only one point; other possibilities may occur			A	Except in the absolutely parallel or absolutely perpendicular cases, isoclinic planes possess chirality, so some configurations cannot be brought into coincidence by rotation
2	Basic Geometry	Regarding the number of planes at origin that are semi-parallel and also semi-perpendicular to two given planes, which statement is correct?	If the two planes are isoclinic, there is exactly one such plane	If the two planes are semi-parallel, there are infinitely many such planes	If the two planes are semi-perpendicular but not isoclinic, there are exactly two such planes	If the two planes are isoclinic, there are exactly two such planes	All of the above are wrong		C	Except for the isoclinic case, which yields infinitely many solutions, all other cases yield exactly two. This can be solved easily using plane state space.
2	Basic Geometry	Given that plane A is semi-parallel and also semi-perpendicular to plane B, and plane B is semi-parallel and also semi-perpendicular to plane C, then plane A and plane C ().	may be absolutely perpendicular or isoclinic, but cannot be semi-parallel and semi-perpendicular	may be semi-parallel and semi-perpendicular or isoclinic, but cannot be absolutely perpendicular	may be semi-parallel and semi-perpendicular or absolutely perpendicular, but cannot be isoclinic	all of the above are possible			D	See the angle-range simulator in "4D Space (XIV): Plane State Space (Part 1)"
2	Topology and Algebra	A needle capable of working with a 1D thread is topologically homotopy equivalent to a	circle	sphere	torus	tubular cylindrical side surface			B	See the hole-dimension matching theory in 4D Space (X): Knots and Links
1	4D World Knowledge	Which statement about 4D beings is correct?	A 4D being needs at least a third eye to have stereoscopic vision capable of depth perception	A 4D being needs at least a third ear to have directional hearing	A humanoid 4D being needs at least a third leg to stand stably on the ground	A humanoid 4D being needs at least three long spherinder-shaped chopsticks to eat food	All above are correct	All are wrong	F	Two are sufficient in all these cases
1	4D World Knowledge	Which statement about 4D rotational machinery is correct?	A 4D electric fan produces the most uniform airflow when using clifford (isoclinic) rotation	The structure and operating principle of a 4D screw and a 4D propeller are completely different	A 4D screw shaft experiences the most uniform stress when shaped as a duocylinder	A screw-on bottle cap in 4D can be shaped as a partially closed spherinder			D	Double-rotation fans have no fixed airflow direction, so A is false; screws and propellers operate in very similar ways in 4D, so B is false; a duocylinder is not a linear body and cannot provide translational advancement, so C is false
1	4D World Knowledge	Which statement about 4D road planning is correct?	One can cheaply build structures analogous to our 3D interchanges to alleviate traffic congestion	All roads in a country should consistently follow either right-hand or left-hand traffic to avoid confusion	A 4D roundabout must be spherical, allowing vehicles to move freely over its outer spherical surface				A	In 4D, ramps can be built entirely on the ground without bridges, so A is correct; in 4D ground traffic, left and right lanes cannot be distinguished purely by travel direction, so B is false; traffic flow is essentially linear, so C is false
1	4D World Knowledge	Which statement about 4D handicrafts is incorrect?	A 4D hand ring has the shape of a torisphere	A 4D necklace cannot simply be a circle, but it can be made into a mesh grid	A collection of pairwise-linked Hopf-link rubber bands can serve as a common keychain decoration	Hyperspherical beads can be threaded not only on a 1D string but also on a 2D sheet or surface			C	Hopf links fall apart in 4D and therefore cannot be used on keychains
3	Topology and Algebra	Which statement about integration of vector fields on R⁴ is incorrect?	The circulation of a vector field around a closed curve equals the integral of its curl over any surface bounded by that curve	The circulation of a bivector field over a closed surface equals the integral of its curl over any curved cell bounded by that surface	The flux of a bivector field through a closed curve equals the integral of its divergence over any surface bounded by that curve	The flux of a vector field through a closed curved cell equals the integral of its divergence over the enclosed hypervolume region	All above are correct	All are wrong	C	C is incorrect. The flux of a bivector field should be evaluated through a closed surface, not a closed curve.
2	4D World Knowledge	Which statement about 4D textiles is correct?	Ordinary threads cannot usually weave 4D garments, but two 2D sheets can be stitched together by repeatedly passing a needle and thread through them, just as in 3D space	Garments can be woven entirely from tube-like threads	Two 3D fabrics cannot be sewn together using a 1D thread	1D and 2D threads cannot be mixed in 4D textiles			B	A is false because extra dimensions allow the thread to slip out; B is correct because a large class of 4D surface knots are tubular knots; C is false because dimension matching allows 1D threads to sew 3D fabrics; D is false because 1D and 2D threads can be linked accroding to dimension-matching theory of holes.
1	4D World Knowledge	Which statement about 4D books and calligraphy is correct?	A book spine must be a 1D line	Although ordinary writing is inconvenient, artistic lettering can incorporate many 2D elements, such as strokes drawn in absolutely perpendicular plane directions	Paragraphs need no indentation and can continue on another layer of the same page	A book page may be spherical in shape	Because of the existence of Seifert fibrations, books can be designed with a trefoil knot as the spine		C	The axis of rotation is 2D, so A, D, and E are false. Book pages are 3D objects and cannot accommodate the absolutely perpendicular planar strokes in 4D space.
3	Comprehensive	Which statement about polytwisters is incorrect?	Its unfolded structure consists of twisted rod-like objects	If thrown onto the ground and allowed to roll, it undergoes double rotation	Locally, each curved cell is indistinguishable from the lateral cell of a cubinder in terms of curvature	Locally, each curved cell is indistinguishable from the lateral cell of a duocylinder in terms of curvature	All above are correct	All are wrong	B	Locally, a polytwister has the same curvature as a cubinder or duocylinder, so rolling does not produce double rotation
2	Basic Geometry	Which statement about 2D surfaces is correct?	Excluding special cases such as the Möbius strip, a 2D surface generally still has two sides	A 2D surface still has two possible orientations, which can be represented by marking a vortex direction	The total area of all 2D faces of any finite convex 4D shapes can be computed	Except in special cases, the normal vector of a 2D surface is uniquely determined	All above are correct		B	Just as a 1D line in 3D space no longer has distinguishable sides but still has two possible directions, a 2D surface similarly retains orientation independent of the ambient dimension
2	Basic Geometry	Rotating a torus surface about a plane cannot produce ().	ditorus	spheritorus	torisphere	tiger	all are possible		E	See the last row of the common solids-of-revolution chart in 4D Space (IX): Curved Shapes
2	Basic Geometry	Rotating a cube about a plane parallel to one of its faces but disjoint from it produces a solid. Which statement is incorrect?	It is a duoprism	It can be obtained by taking the Boolean difference of two cubinders of different sizes	All of its 3D boundary components are not flat cells	Its curved cells can be flattened into cuboids	All above are correct		C	Faces perpendicular to the rotation plane generate hollow cylinders, which are ordinary flat 3D cells
1	Basic Geometry	Which statement about double rotation is correct?	Any two simple rotations can be combined into a double rotation	The two rotation planes of a double rotation must be absolutely perpendicular	Isoclinic double rotations have no chirality, whereas non-isoclinic double rotations do	A cubinder possesses isoclinic double-rotation symmetry	All above are correct		B	To combine into a double rotation, the two simple rotation planes must intersect only at a point; all double rotations have chirality; cubinders do not possess double-rotation symmetry, but duocylinders do

3	Topology and Algebra	Suppose planes A and B have principal angles 20° and 30°, while planes B and C are isoclinic with angle 5°. If the chirality of (A,B) and (B,C) is the same, then the principal angles between A and C cannot be	30,30	20,30	25,35	15,25	all are possible		A	See 4D Space (XIV): Plane State Space (Part 1)
3	Topology and Algebra	Given that the angle between plane A and cell B is 50°, and plane C is parallel to cell B, which of the following may be the principal angles between planes A and C?	90,90	5,45	55,55	15,75	all are possible		D	See 4D Space (XV): Plane State Space (Part 2)

2	4D World Knowledge	Which pair of shapes can form a rigid interlocked link that cannot come apart?	torisphere-torisphere	tiger-tiger	duocylinder-duocylinder				B See "Rigid Chains" in Tesserxel examples
2	Topology and Algebra	Consider the simplest overhand knot with both ends fixed on a plane. Which statement about the surface obtained by rotating it around that plane is incorrect?	The resulting surface can be easily untied in 4D space	The resulting surface is homeomorphic to a 2-sphere	The resulting surface has no self-intersection in 4D space, but any 3D projection of it must contain self-intersections	All above are correct			A	See 4D Space (XII): Unknotting Spherical Knots
2	Topology and Algebra	Consider the simplest overhand knot with both ends fixed on a plane. While rotating it once around the plane, the knot itself is also rotated once. Which statement about the resulting surface is incorrect?	The resulting surface can be easily untied in 4D space	The resulting surface is homeomorphic to a 2-sphere	The resulting surface has no self-intersection in 4D space, but any 3D projection of it must contain self-intersections	All above are correct			D	See 4D Space (XII): Unknotting Spherical Knots

2	Topology and Algebra	If two planes are semi-perpendicular, then their corresponding bivectors satisfy	inner product equals 0	exterior product equals 0	both inner and exterior products equal 0	neither product is necessarily zero			A	See 4D Space (VII): N-Dimensional Vectors
2	Topology and Algebra	Between a self-dual bivector and an anti-self-dual bivector,	inner product equals 0	exterior product equals 0	both inner and exterior products equal 0	neither product is necessarily zero			C	See 4D Space (VII): N-Dimensional Vectors
2	Topology and Algebra	Which statement about rotations is correct?	A 4D rotation has 4 degrees of freedom	4D rotations can be classified into isoclinic rotations and double rotations	A 4D rotation has no unique rotation axis, but always has a unique rotation plane	A 4D rotation may have infinitely many rotation planes			D	A 4D rotation has 6 degrees of freedom and can be classified into simple rotations and double rotations. Isoclinic double rotations possess high symmetry and therefore have infinitely many rotation planes.

1	4D World Knowledge	The driver of a planar track railway train ()	must steer in order to make the train turn	does not need to steer because the train turns automatically throughout the journey	will sometimes find that the steering wheel becomes ineffective	all are wrong			D	See 4D Space (XII): Unknotting Spherical Knots
2	4D World Knowledge	Which of the following wheel shapes can still roll in a straight line after tipping over from its normal upright rolling position?	dicone	cubinder	duocylinder	duocone			C	Dicones and duocones can still roll after tipping over, but not with a straight line; a cubinder cannot roll anymore once tipped over.
1	4D World Knowledge	The shape of a 4D being's drinking straw is most similar to ().	a hollow spherinder	a hollow duocylinder	a ditorus	a toroidal prism	a torisphere	a cylindrical surface thickened into the fourth dimension	A	Humans commonly use hollow cylinders in 3D, so the natural 4D analogue is a hollow spherinder

    const first = createPaper();

<div style="float:right;font-size:1.3em">

`;

    currentColumn.appendChild(header);
    currentHeight = header.offsetHeight;
    const subjectStats = new Map();
    const subjectNameToIndex = new Map();
    let currentSubject = null;
    let subjectNumber = 0;
    let subjectOrdinal = ["Part I", "Part II", "Part III", "Part IV", "Part V", "Part VI"];

    qs.forEach((q, i) => {

      const node = buildQuestion(q, i);
      const test = node.cloneNode(true);
      measure.appendChild(test);
      const h = test.offsetHeight;
      measure.innerHTML = "";
      if (currentHeight + h > COLUMN_HEIGHT) {
        if (currentColumn === currentPaper.left) {
          currentColumn = currentPaper.right;
          currentHeight = 0;
        }
        else {
          currentPaper = createPaper();
          currentColumn = currentPaper.left;
          currentHeight = 0;
        }
      }
      const subject = q["科目"];

      if (!subjectStats.has(subject)) {

        subjectStats.set(subject, {
          count: 0
        });
      }

      subjectStats.get(subject).count++;
      if (subject !== currentSubject) {

        currentSubject = subject;

        const section =
          document.createElement("div");

        section.className =
          "subject-header";

        section.innerHTML =
          `${subjectOrdinal[subjectNumber++]} ${currentSubject}<span
        class="subject-stat"
        id="subject-stat-${subjectNumber}"></span>`;
        currentColumn.appendChild(section);
        subjectNameToIndex.set(
          currentSubject,
          subjectNumber
        );
      }
      currentColumn.appendChild(node);
      currentHeight += h;
      const c = document.createElement("div");
      c.className = "card";
      c.textContent = i + 1;

      card.appendChild(c);

      node.querySelectorAll("input").forEach(inp => {

    for (const [subject, index] of subjectNameToIndex) {
      const count = subjectStats.get(subject).count;
      const score = count;

      document.getElementById(`subject-stat-${index}`).innerText = `(${count} questions in total, 1 point each, ${score} points in total)`;
    }

    document.querySelectorAll(".page-number").forEach((e, i) => {
      e.innerHTML = `Page ${i + 1}  / Total ${pageCount} Pages`;
    });

    function submitPaper() {
      let got = 0, total = 0;
      submitted = true;

      qs.forEach((q, i) => {
        let w = Number(q["难度"]) || 1;
        total += w;

        let ans = q["答案"].trim();
        let sel = document.querySelector(`input[name=q${i}]:checked`);
        let box = document.getElementById("a" + i);
        let cardEl = card.children[i];

        box.style.display = "block";

        if (sel && sel.value === ans) {
          got += w;
          cardEl.classList.add("answer-right");
          box.innerHTML = `✓ Correct<br>Answer: ${ans}<br>Solution: ${q["解析"]}`;
          document.getElementById("q" + i).style.background = "#eefcee";
        } else {
          cardEl.classList.add("answer-wrong");
          box.innerHTML = `✗ Wrong<br>Your answer: ${sel ? sel.value : "Empty"}<br> Correct answer: ${ans}<br>Solution: ${q["解析"]}`;
          document.getElementById("q" + i).style.background = "#fff1f1";
        }
      });

      let score = Math.round(got / total * 100);
      document.getElementById("score").textContent = `Score：${score} `;
      window.scrollTo({ top: 0, behavior: "smooth" });

      let desc = null;
      if (score < 1) {
        desc = "are actually a zero-dimensional creature";
      } else if (score < 5) {
        desc = "are actually a one-dimensional creature";
      } else if (score < 10) {
        desc = "are actually a two-dimensional creature";
      } else if (score < 20) {
        desc = "are a 3D human who was clearly unprepared for this exam";
      } else if (score < 30) {
        desc = "need further spatial cognition training";
      } else if (score < 40) {
        desc = "are an ordinary 3D human, but still need more effort before going to 4D world";
      } else if (score < 50) {
        desc = "have reached the level of a 4D elementary school student";
      } else if (score < 55) {
        desc = "have reached the level of a 4D middle school student";
      } else if (score < 60) {
        desc = "have reached the level of a 4D high school student";
      } else if (score < 65) {
        desc = "have just met the minimum qualification required to enter the fourth-dimensional world";
      } else if (score < 70) {
        desc = "have been granted a temporary residence permit in the fourth-dimensional world";
      } else if (score < 75) {
        desc = "have reached the level of an average fourth-dimensional citizen";
      } else if (score < 80) {
        desc = "have reached the level of a fourth-dimensional bachelor's degree graduate";
      } else if (score < 85) {
        desc = "have reached the level of a fourth-dimensional postgraduate student";
      } else if (score < 90) {
        desc = "have reached the level of a fourth-dimensional geometer";
      } else if (score < 95) {
        desc = "have been designated as a key talent by the Regular 24-Cell Academy of Sciences";
      } else if (score < 100) {
        desc = "have reached the legendary level of a five-dimensional observer";
      } else {
        desc = "may have participated illegally as a 5D being in an examination intended for 3D humans; please cooperate with dimensional identity verification";
      }
      document.getElementById("confirmDialog").style.display = "none";

      document.getElementById("resultDialog").style.display = "block";

      document.getElementById("resultText").innerHTML = `Score：${score}<br><br>The System detected that you ` + desc;
      document.querySelector(".questions").scrollTo({ top: 0, behavior: "smooth" });
      updateURL(true);
    }
    function updateTopbarSpace() {
      const topbar = document.querySelector(".topbar");
      // document.body.style.paddingTop = topbar.offsetHeight + "px";
    }

    document.body.onload = () => {
      updateTopbarSpace();
      loadShareURL();
    }
    function showSubmitDialog() {
      if (submitted) {
        document.getElementById("overlay").style.display = "flex";
        document.querySelectorAll(".dialog").forEach(x => x.style.display = "none");

        document.getElementById("resultDialog").style.display = "block";
        document.getElementById("res-title").innerText = "The examination has already ended and cannot be submitted again";
        return;
      }

      let unanswered = 0;

      qs.forEach((q, i) => {

        const sel =
          document.querySelector(
            `input[name=q${i}]:checked`
          );

        if (!sel) {
          unanswered++;
        }
      });

      document.getElementById("confirmText").innerHTML = (unanswered ? `There are still <b>${unanswered}</b> unanswered questions. Are you sure you want to submit the exam?`
        : `All questions have been answered. Are you sure you want to submit the exam?`);

      document.getElementById("overlay").style.display = "flex";
      document.getElementById("confirmDialog").style.display = "block";
      document.getElementById("resultDialog").style.display = "none";
    }
    window.addEventListener("resize", updateTopbarSpace);

    const SHARE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";

    function parity(str) {
      let p = 0;
      for (const c of str) p ^= SHARE_CHARS.indexOf(c);
      return p & 63;
    }

    function buildShareURL(onlyData) {
      let bits = "";

      for (let i = 0; i < 100; i++) {
        const checked = document.querySelector(`input[name=q${i}]:checked`);

        let v = 0;
        if (checked) v = "ABCDEF".indexOf(checked.value) + 1;

        bits += v.toString(2).padStart(3, "0");
      }

      let data = "";

      for (let i = 0; i < 300; i += 6) {
        const v = parseInt(bits.slice(i, i + 6), 2);
        data += SHARE_CHARS[v];
      }

      data += SHARE_CHARS[submitted ? 1 : 0];
      data += SHARE_CHARS[parity(data)];
      data = rleEncode(data);

      return (!onlyData ? location.origin + location.pathname + "?a=" : "") + data;
    }

    function showShareDialog() {
      document.getElementById("shareUrl").value = window.location.href;
      document.querySelectorAll(".dialog").forEach(x => x.style.display = "none");
      document.getElementById("overlay").style.display = "flex";
      document.getElementById("shareDialog").style.display = "block";
      document.getElementById("copy-title").innerText = "Please Copy URL of This Exam Paper";
    }

    function hideShareDialog() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("shareDialog").style.display = "none";
    }

    async function copyShareURL() {
      const text = document.getElementById("shareUrl").value;

      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("copy-title").innerText = "URL Copied";
      } catch {
        const ta = document.getElementById("shareUrl");
        ta.select();
        document.execCommand("copy");
        document.getElementById("copy-title").innerText = "URL Copied";
      }
    }

    function updateURL(submit) {
      if (submitted && !submit) return;
      const url = new URL(location.href);
      url.searchParams.set("a", buildShareURL(true));
      history.replaceState({}, "", url);
    }
    function loadShareURL() {
      const data = rleDecode(new URLSearchParams(location.search).get("a"));
      if (!data || data.length !== 52) return;

      const body = data.slice(0, 51);
      const check = SHARE_CHARS.indexOf(data[51]);

      if (parity(body) !== check) {
        console.error("Failed to load URL");
        return;
      }

      let bits = "";

      for (let i = 0; i < 50; i++) {
        const v = SHARE_CHARS.indexOf(data[i]);
        bits += v.toString(2).padStart(6, "0");
      }

      for (let i = 0; i < 100; i++) {
        const v = parseInt(bits.slice(i * 3, i * 3 + 3), 2);

        if (v === 0) continue;

        const option = "ABCDEF"[v - 1];

        const radio = document.querySelector(
          `input[name=q${i}][value="${option}"]`
        );

        if (radio) {
          radio.checked = true;
          radio.dispatchEvent(new Event("change"));
        }
      }

      submitted = !!SHARE_CHARS.indexOf(data[50]);
      if (submitted) submitPaper();
    }
    function rleEncode(str) {
      let out = "";
      let i = 0;

      while (i < str.length) {
        let j = i + 1;

        while (j < str.length && str[j] === str[i]) {
          j++;
        }

        const cnt = j - i;

        if (cnt >= 4) {
          out += "~" + cnt + "~" + str[i];
        } else {
          out += str.slice(i, j);
        }

        i = j;
      }

      return shiftEncode(out);
    }
    function rleDecode(str) {
      if (!str) return;
      str = shiftDecode(str);
      return str.replace(
        /~(\d+)~(.)/g,
        (_, count, ch) => ch.repeat(+count)
      );
    }
    function shiftEncode(str) {
      let out = "";

      for (let i = 0; i < str.length; i++) {
        const idx = SHARE_CHARS.indexOf(str[i]);

        if (idx === -1) {
          out += str[i];
          continue;
        }

        out += SHARE_CHARS[(idx + i) & 63];
      }

      return out;
    }
    function shiftDecode(str) {
      let out = "";

      for (let i = 0; i < str.length; i++) {
        const idx = SHARE_CHARS.indexOf(str[i]);

        if (idx === -1) {
          out += str[i];
          continue;
        }

        out += SHARE_CHARS[(idx - i + 64 * 10) & 63];
      }

      return out;
    }
